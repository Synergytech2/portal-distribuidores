services:
  - type: web
    name: aevor-portal-distribuidores
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: PRICE_FILE
        value: /precios_distribuidor.json
      - key: DROPBOX_REFRESH_TOKEN
        sync: false
      - key: DISTRIBUTORS
        value: "[]"
